<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CodeLens Admin - Login</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; background: #0f1117; color: #f1f3f9; display: flex; align-items: center; justify-content: center; min-height: 100vh; }
        .card { background: #1a1d2e; border: 1px solid #2a2f45; border-radius: 16px; padding: 40px; width: 360px; }
        h1 { font-size: 24px; margin-bottom: 24px; text-align: center; }
        .form-group { margin-bottom: 16px; }
        label { display: block; font-size: 14px; color: #9ca8c8; margin-bottom: 6px; }
        input { width: 100%; padding: 12px 16px; background: #0f1117; border: 1px solid #2a2f45; border-radius: 10px; color: #f1f3f9; font-size: 14px; outline: none; }
        input:focus { border-color: #6366f1; box-shadow: 0 0 0 2px rgba(99,102,241,0.2); }
        button { width: 100%; padding: 12px; background: #6366f1; border: none; border-radius: 10px; color: white; font-size: 14px; font-weight: 600; cursor: pointer; }
        button:hover { background: #4f46e5; }
        .error { color: #ef4444; font-size: 13px; text-align: center; margin-bottom: 16px; }
    </style>
</head>
<body>
    <div class="card">
        <h1>CodeLens Admin</h1>
        {% if error %}
        <div class="error">{{ error }}</div>
        {% endif %}
        <form method="post" action="/admin/login">
            <div class="form-group">
                <label>Admin Password</label>
                <input type="password" name="password" required autofocus>
            </div>
            <button type="submit">Login</button>
        </form>
    </div>
</body>
</html>
